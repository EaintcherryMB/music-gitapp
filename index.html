<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaintcherryMB Music Player</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
            background-image: url('shop-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        /* Running Text Style */
        .marquee {
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 20px;
        }
        .marquee h2 {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
            color: #1db954;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .player-container { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(26, 26, 26, 0.9);
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
            text-align: center; 
            position: sticky; 
            top: 10px; 
            z-index: 100; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        #current-song { font-size: 1.1em; font-weight: bold; color: #1db954; margin-bottom: 15px; }
        
        audio { width: 100%; filter: invert(90%); }

        /* Control Buttons Style */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }
        .btn {
            background: none;
            border: 1px solid #555;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn:hover { background: #333; border-color: #1db954; }
        .active-mode { background: #1db954 !important; border-color: #1db954; }

        #playlist { list-style: none; padding: 0; margin-top: 30px; width: 90%; max-width: 450px; }
        .song-item { 
            background: rgba(37, 37, 37, 0.8);
            margin-bottom: 8px; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border-left: 5px solid transparent; 
        }
        .song-item.active { border-left: 5px solid #1db954; background: rgba(40, 40, 40, 0.9); color: #1db954; }
    </style>
</head>
<body>

    <div class="marquee">
        <h2 🎵 🎵အိမ့်ချယ်ရီမိုဘိုင်း music — “အိမ့်ချယ်ရီ မိုဘိုင်းလ်နှင့်လျှပ်စစ်” အမှတ်(၅)ရပ်ကွက်၊ဒို့အင်အားဆိုင်ရှေ့၊
            ကုန်သည်လမ်း၊လပွတ္တာမြို့။ ဖုန်း-09790199067-09262450004
            နားဆင်ပေးမှုကို ကျေးဇူးတင်ပါသည်🎵 —</h2>
    </div>

    <div class="player-container">
        <div id="current-song">သီချင်းရွေးချယ်ပါ</div>
        <audio id="audio-player" controls></audio>
        
        <div class="controls">
            <button class="btn" onclick="prevSong()">⏮ Prev</button>
            <button class="btn" id="repeat-btn" onclick="toggleRepeat()">🔁 Repeat Off</button>
            <button class="btn" onclick="nextSong()">Next ⏭</button>
        </div>
    </div>

    <ul id="playlist">
        <li>သီချင်းများ ရှာဖွေနေသည်...</li>
    </ul>

    <script>
        const username = "EaintcherryMB"; 
        const repo = "music-gitapp";

        const playlistElement = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audio-player');
        const currentSongTitle = document.getElementById('current-song');
        const repeatBtn = document.getElementById('repeat-btn');

        let songs = [];
        let currentIndex = -1;
        let repeatMode = 'off'; // off, one, all

        async function fetchSongs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();
                songs = files.filter(file => file.name.toLowerCase().endsWith('.mp3'));
                
                if (songs.length === 0) {
                    playlistElement.innerHTML = "<li>သီချင်းမရှိပါ။</li>";
                    return;
                }

                playlistElement.innerHTML = ""; 
                songs.forEach((song, index) => {
                    const li = document.createElement('li');
                    li.className = "song-item";
                    li.id = "song-" + index;
                    li.innerText = "▶ " + song.name.replace('.mp3', '');
                    li.onclick = () => playSong(index);
                    playlistElement.appendChild(li);
                });
            } catch (error) {
                playlistElement.innerHTML = "<li>Error loading songs.</li>";
            }
        }

        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            currentIndex = index;
            const song = songs[index];
            audioPlayer.src = song.download_url;
            audioPlayer.play();
            currentSongTitle.innerText = song.name.replace('.mp3', '');
            
            document.querySelectorAll('.song-item').forEach(item => item.classList.remove('active'));
            document.getElementById("song-" + index).classList.add('active');
        }

        function nextSong() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= songs.length) nextIndex = 0;
            playSong(nextIndex);
        }

        function prevSong() {
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = songs.length - 1;
            playSong(prevIndex);
        }

        function toggleRepeat() {
            if (repeatMode === 'off') {
                repeatMode = 'all';
                repeatBtn.innerText = "🔁 Repeat All";
                repeatBtn.classList.add('active-mode');
            } else if (repeatMode === 'all') {
                repeatMode = 'one';
                repeatBtn.innerText = "🔂 Repeat One";
            } else {
                repeatMode = 'off';
                repeatBtn.innerText = "🔁 Repeat Off";
                repeatBtn.classList.remove('active-mode');
            }
        }

        // သီချင်းဆုံးသွားလျှင် လုပ်ဆောင်ချက်
        audioPlayer.onended = () => {
            if (repeatMode === 'one') {
                audioPlayer.play();
            } else if (repeatMode === 'all' || currentIndex < songs.length - 1) {
                nextSong();
            }
        };

        fetchSongs();
    </script>
</body>
</html>
