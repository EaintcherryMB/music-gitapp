<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal 2026 (Full Pro)</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #1c1e21;
            --sidebar-bg: #2c3e50;
            --accent: #3498db;
            --playing-border: #2ecc71;
        }

        [data-theme="dark"] {
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-color: #e4e6eb;
            --sidebar-bg: #1c1c1c;
        }

        body { font-family: sans-serif; display: flex; margin: 0; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; min-height: 100vh; flex-direction: column; }
        @media (min-width: 768px) { body { flex-direction: row; } }

        /* Sidebar */
        .sidebar { width: 100%; background: var(--sidebar-bg); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        @media (min-width: 768px) { .sidebar { width: 280px; height: 100vh; } }

        .menu-item { padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; display: block; }
        .menu-active { background: var(--accent); font-weight: bold; }

        .main { flex: 1; padding: 20px; padding-bottom: 180px; }
        #content-display { max-width: 800px; margin: 0 auto; }
        
        .post-card { background: var(--card-bg); border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 3px solid transparent; transition: 0.3s; position: relative; }
        .is-playing { border-color: var(--playing-border); background: rgba(46, 204, 113, 0.05); }

        /* Audio Player Bar */
        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1c1e21; color: white;
            padding: 15px; z-index: 2000; box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
            display: none; flex-direction: column; align-items: center;
        }
        .repeat-status-tag { font-size: 11px; color: #bbb; margin-bottom: 4px; font-weight: bold; }
        .track-info { font-size: 14px; margin-bottom: 8px; color: #2ecc71; font-weight: bold; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .seek-container { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #seek-bar { flex: 1; height: 5px; cursor: pointer; accent-color: #2ecc71; }
        .time-text { font-size: 11px; color: #bbb; min-width: 35px; }

        .player-controls { display: flex; align-items: center; gap: 30px; }
        .p-btn { cursor: pointer; font-size: 24px; transition: 0.2s; user-select: none; }
        .p-btn:hover { color: var(--accent); transform: scale(1.1); }
        .active-repeat { color: #2ecc71; text-shadow: 0 0 8px #2ecc71; }

        /* Modals */
        .admin-controls { display: flex; padding: 10px; background: rgba(0,0,0,0.05); justify-content: flex-end; gap: 15px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 25px; border-radius: 15px; z-index: 3000; width: 90%; max-width: 400px; box-shadow: 0 10px 50px rgba(0,0,0,0.3); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2999; backdrop-filter: blur(4px); }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text-color); }
        .btn-primary { background: #2ecc71; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .fab { position: fixed; bottom: 140px; right: 30px; width: 60px; height: 60px; background: #2ecc71; color: white; border-radius: 50%; font-size: 30px; border: none; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
    </style>
</head>
<body data-theme="light">

    <div class="sidebar">
        <h2>🎓 Portal 2026</h2>
        <div id="theme-btn" style="cursor:pointer; text-align:center; padding:10px; background:rgba(255,255,255,0.1); border-radius:8px; margin-bottom:15px;">🌓 Theme Change</div>
        
        <div id="m-all" class="menu-item menu-active">🏠 အားလုံး</div>
        <div id="m-audio" class="menu-item">🎵 သီချင်းနှင့် တရား</div>
        <div id="m-study" class="menu-item">📘 စာကျက်နည်းများ</div>

        <div style="margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
            <div id="admin-status" style="cursor:pointer; color:#2ecc71;">🔒 Admin Login</div>
            <div id="admin-tools" style="display:none; margin-top:10px;">
                <button id="change-pass-btn" style="width:100%; background:#f39c12; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-size:11px;">🔑 Change Password</button>
            </div>
        </div>
    </div>

    <div class="main">
        <h1 id="category-title" style="text-align:center;">🏠 အားလုံး</h1>
        <div id="content-display">အချက်အလက်များ ဆွဲယူနေသည်...</div>
    </div>

    <div class="player-bar" id="player-bar">
        <div class="repeat-status-tag" id="repeat-status-text">Repeat Off</div>
        <div class="track-info" id="track-info">ဖွင့်နေသည် - ...</div>
        
        <div class="seek-container">
            <span class="time-text" id="current-time">0:00</span>
            <input type="range" id="seek-bar" value="0" min="0" max="100">
            <span class="time-text" id="total-duration">0:00</span>
        </div>

        <audio id="audio-engine"></audio>
        <div class="player-controls">
            <div class="p-btn" id="repeat-btn" title="Repeat Mode">🔁</div>
            <div class="p-btn" id="prev-btn">⏮</div>
            <div class="p-btn" id="play-pause-btn" style="font-size:35px;">▶️</div>
            <div class="p-btn" id="next-btn">⏭</div>
            <div class="p-btn" id="close-player-btn" title="Close Player">✖️</div>
        </div>
    </div>

    <button id="add-btn" class="fab" style="display:none;">+</button>
    <div id="overlay"></div>

    <div id="login-modal" class="modal">
        <h3>Admin Login</h3>
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn-primary" id="login-submit">Login</button>
    </div>

    <div id="pass-modal" class="modal">
        <h3>Password ပြောင်းရန်</h3>
        <input type="password" id="oldP" placeholder="Old Password">
        <input type="password" id="newP" placeholder="New Password">
        <button class="btn-primary" id="pass-submit">Update</button>
    </div>

    <div id="upload-modal" class="modal">
        <h3 id="modal-title">ပို့စ်အသစ်</h3>
        <input type="hidden" id="edit-id">
        <select id="postCat">
            <option value="audio">🎵 သီချင်းနှင့် တရား</option>
            <option value="study">📘 စာကျက်နည်းများ</option>
        </select>
        <input type="text" id="postTitle" placeholder="ခေါင်းစဉ်">
        <textarea id="postContent" rows="4" placeholder="အကြောင်းအရာ"></textarea>
        <input type="text" id="postAudioUrl" placeholder="Audio Link">
        <button class="btn-primary" id="save-post-btn">သိမ်းမည်</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, where, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4c2aE6LOMjf00e_SPIB7snz8MbYy37_g",
            authDomain: "cherry-project-08.firebaseapp.com",
            projectId: "cherry-project-08",
            storageBucket: "cherry-project-08.appspot.com",
            appId: "1:600023073662:web:8c60662b02f7dbac13692f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isAdmin = false;
        let playlist = [];
        let currentIndex = -1;
        let repeatMode = 0; // 0: Off, 1: All, 2: One

        const audio = document.getElementById('audio-engine');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const seekBar = document.getElementById('seek-bar');
        const repeatBtn = document.getElementById('repeat-btn');
        const repeatText = document.getElementById('repeat-status-text');

        // --- Core UI Functions ---
        window.toggleTheme = () => {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        };

        window.showModal = (id) => {
            document.getElementById(id).style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        };

        window.hideAllModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('overlay').style.display = 'none';
        };

        // --- Audio Logic ---
        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                seekBar.value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-duration').innerText = formatTime(audio.duration);
            }
        };

        seekBar.oninput = () => { audio.currentTime = (seekBar.value / 100) * audio.duration; };

        window.initTrack = (index) => {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const track = playlist[currentIndex];
            audio.src = track.url;
            document.getElementById('track-info').innerText = "ဖွင့်နေသည် - " + track.title;
            document.getElementById('player-bar').style.display = "flex";
            
            document.querySelectorAll('.post-card').forEach(c => c.classList.remove('is-playing'));
            const card = document.getElementById('card-' + track.id);
            if(card) card.classList.add('is-playing');

            audio.play().catch(e => console.log("Audio play failed", e));
            playPauseBtn.innerText = "⏸️";
        };

        window.togglePlay = () => {
            if (audio.paused) { audio.play(); playPauseBtn.innerText = "⏸️"; }
            else { audio.pause(); playPauseBtn.innerText = "▶️"; }
        };

        window.playNext = () => {
            let next = (currentIndex + 1) >= playlist.length ? 0 : currentIndex + 1;
            window.initTrack(next);
        };

        window.playPrevious = () => {
            let prev = (currentIndex - 1) < 0 ? playlist.length - 1 : currentIndex - 1;
            window.initTrack(prev);
        };

        window.cycleRepeatMode = () => {
            repeatMode = (repeatMode + 1) % 3;
            if (repeatMode === 0) {
                repeatBtn.innerText = "🔁";
                repeatBtn.classList.remove('active-repeat');
                repeatText.innerText = "Repeat Off";
                repeatText.style.color = "#bbb";
            } else if (repeatMode === 1) {
                repeatBtn.innerText = "🔁";
                repeatBtn.classList.add('active-repeat');
                repeatText.innerText = "Repeat All";
                repeatText.style.color = "#2ecc71";
            } else if (repeatMode === 2) {
                repeatBtn.innerText = "🔂";
                repeatBtn.classList.add('active-repeat');
                repeatText.innerText = "Repeat One";
                repeatText.style.color = "#2ecc71";
            }
        };

        audio.onended = () => {
            if (repeatMode === 2) {
                audio.play();
            } else if (repeatMode === 1 || currentIndex < playlist.length - 1) {
                window.playNext();
            } else {
                playPauseBtn.innerText = "▶️";
            }
        };

        // --- Firebase Content ---
        window.loadContent = (filter = 'all') => {
            let q = query(collection(db, "portal_content"), orderBy("date", "desc"));
            if (filter !== 'all') q = query(collection(db, "portal_content"), where("category", "==", filter), orderBy("date", "desc"));

            onSnapshot(q, (snap) => {
                const display = document.getElementById('content-display');
                display.innerHTML = "";
                playlist = [];
                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    const hasAudio = data.audioUrl && data.audioUrl.trim() !== "";
                    if (hasAudio) playlist.push({ id, title: data.title, url: data.audioUrl });
                    const pIdx = playlist.length - 1;

                    let adminHtml = isAdmin ? `
                        <div class="admin-controls">
                            <button onclick="window.editPost('${id}', '${data.category}', \`${data.title}\`, \`${data.content}\`, '${data.audioUrl}')" style="color:#3498db; border:none; background:none; cursor:pointer;">ပြင်ရန်</button>
                            <button onclick="window.deletePost('${id}')" style="color:#e74c3c; border:none; background:none; cursor:pointer;">ဖျက်ရန်</button>
                        </div>` : '';

                    display.innerHTML += `
                        <div class="post-card" id="card-${id}">
                            ${adminHtml}
                            <div style="padding:20px; cursor: ${hasAudio ? 'pointer' : 'default'}" onclick="${hasAudio ? `window.initTrack(${pIdx})` : ''}">
                                <small>#${data.category}</small>
                                <h2 style="margin:5px 0;">${data.title} ${hasAudio ? '🎵' : ''}</h2>
                                <p style="white-space:pre-wrap;">${data.content}</p>
                            </div>
                        </div>`;
                });
            });
        };

        // --- Admin Actions ---
        window.handleLogin = async () => {
            const pass = document.getElementById('loginPass').value;
            const s = await getDoc(doc(db, "settings", "admin"));
            if (pass === (s.exists() ? s.data().password : "admin123")) {
                isAdmin = true;
                document.getElementById('admin-status').innerText = "🔓 Admin Active";
                document.getElementById('add-btn').style.display = 'block';
                document.getElementById('admin-tools').style.display = 'block';
                hideAllModals(); loadContent();
            } else { alert("Password မှားယွင်းနေပါသည်။"); }
        };

        window.editPost = (id, cat, title, content, url) => {
            document.getElementById('edit-id').value = id; 
            document.getElementById('postCat').value = cat;
            document.getElementById('postTitle').value = title; 
            document.getElementById('postContent').value = content;
            document.getElementById('postAudioUrl').value = url; 
            showModal('upload-modal');
        };

        window.deletePost = async (id) => { if(confirm("ဖျက်မှာလား?")) await deleteDoc(doc(db, "portal_content", id)); };

        // --- Event Listeners ---
        document.getElementById('theme-btn').onclick = window.toggleTheme;
        document.getElementById('m-all').onclick = () => window.loadContent('all');
        document.getElementById('m-audio').onclick = () => window.loadContent('audio');
        document.getElementById('m-study').onclick = () => window.loadContent('study');
        document.getElementById('admin-status').onclick = () => showModal('login-modal');
        document.getElementById('login-submit').onclick = window.handleLogin;
        document.getElementById('overlay').onclick = window.hideAllModals;
        document.getElementById('play-pause-btn').onclick = window.togglePlay;
        document.getElementById('next-btn').onclick = window.playNext;
        document.getElementById('prev-btn').onclick = window.playPrevious;
        document.getElementById('repeat-btn').onclick = window.cycleRepeatMode;
        document.getElementById('close-player-btn').onclick = () => { audio.pause(); document.getElementById('player-bar').style.display = 'none'; };

        document.getElementById('save-post-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const payload = {
                title: document.getElementById('postTitle').value,
                content: document.getElementById('postContent').value,
                audioUrl: document.getElementById('postAudioUrl').value,
                category: document.getElementById('postCat').value,
                date: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, "portal_content", id), payload);
            else await addDoc(collection(db, "portal_content"), payload);
            hideAllModals();
        };

        loadContent();
    </script>
</body>
</html>
