<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaintcherryMB Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #e0e0e0; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            background: url('shop-bg.jpg') center/cover no-repeat fixed;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: -1; }

        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 500px; }
        .header h2 { color: #1db954; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Song Card Style */
        .song-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .tag { color: #1db954; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .song-title { font-size: 1.4em; font-weight: bold; margin: 10px 0; }
        
        .action-btns { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .btn-sm { 
            background: rgba(255,255,255,0.1); border: 1px solid #555; color: white;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;
        }
        .btn-sm:hover { background: #1db954; border-color: #1db954; }

        .play-btn {
            background: #1db954; color: white; border: none; padding: 10px 20px;
            border-radius: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px;
        }

        /* Floating Add Button */
        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: #1db954;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
            border: none; transition: 0.3s; z-index: 1000;
        }
        .fab:hover { transform: scale(1.1); }

        /* Admin Section */
        #admin-panel { margin-top: 30px; font-size: 12px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎵 အိမ့်ချယ်ရီမိုဘိုင်း Dashboard</h2>
    </div>

    <div id="playlist-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        </div>

    <button class="fab" onclick="addNewSong()">+</button>

    <div id="admin-panel" onclick="adminLogin()">🔐 Admin Login (For Settings)</div>

    <script>
        const username = "EaintcherryMB"; 
        const repo = "music-gitapp";
        let songs = [];

        async function loadSongs() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = "<p>Loading songs...</p>";

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();
                songs = files.filter(f => f.name.toLowerCase().endsWith('.mp3'));

                container.innerHTML = "";
                songs.forEach((song, index) => {
                    const card = document.createElement('div');
                    card.className = "song-card";
                    card.innerHTML = `
                        <div class="tag">#audio</div>
                        <div class="action-btns">
                            <button class="btn-sm" onclick="editSong('${song.name}')">ပြင်ရန်</button>
                            <button class="btn-sm" onclick="deleteSong('${song.name}', '${song.sha}')">ဖျက်ရန်</button>
                        </div>
                        <div class="song-title">${song.name.replace('.mp3', '')}</div>
                        <button class="play-btn" onclick="location.href='index.html?play=${index}'">
                            <span>▶</span> ဖွင့်မည်
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "<p>Error loading files.</p>"; }
        }

        // --- functions များ ---

        function addNewSong() {
            alert("သီချင်းအသစ်တင်ရန် GitHub App သို့မဟုတ် Website တွင် Upload လုပ်ပေးပါခင်ဗျာ။ \n(API ဖြင့် တိုက်ရိုက်တင်ရန် Token လိုအပ်ပါသည်)");
        }

        function editSong(name) {
            const newName = prompt("သီချင်းအမည်အသစ် ရိုက်ထည့်ပါ:", name.replace('.mp3', ''));
            if(newName) alert("အမည်ကို '" + newName + "' သို့ ပြောင်းလဲရန် GitHub တွင် Rename လုပ်ပေးပါ။");
        }

        function deleteSong(name, sha) {
            if(confirm("'" + name + "' ကို ဖျက်မှာ သေချာပါသလား?")) {
                alert("ဖျက်ရန်အတွက် GitHub Repository ထဲသို့သွား၍ " + name + " ကို Delete လုပ်ပေးပါခင်ဗျာ။");
            }
        }

        function adminLogin() {
            alert("Admin Mode ကို အသုံးပြုရန် GitHub Developer Settings တွင် 'Personal Access Token' တစ်ခု ဆောက်ထားရန် လိုအပ်ပါသည်ခင်ဗျာ။");
        }

        loadSongs();
    </script>
</body>
</html>
