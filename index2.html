<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အိမ့်ချယ်ရီ-လပတ Portal 2026</title>
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --sidebar-bg: #2c3e50; --accent: #3498db; }
        [data-theme="dark"] { --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --sidebar-bg: #1c1c1c; }
        body { font-family: sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; display: flex; flex-direction: column; }
        @media (min-width: 768px) { body { flex-direction: row; } }
        .sidebar { width: 100%; background: var(--sidebar-bg); color: white; padding: 20px; box-sizing: border-box; }
        @media (min-width: 768px) { .sidebar { width: 280px; height: 100vh; position: fixed; overflow-y: auto; } }
        .main { flex: 1; padding: 20px; padding-bottom: 100px; }
        @media (min-width: 768px) { .main { margin-left: 280px; } }
        .menu-item { padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-active { background: var(--accent) !important; font-weight: bold; border: none; }
        .post-card { background: var(--card-bg); border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 25px; border-radius: 15px; z-index: 3000; width: 90%; max-width: 450px; color: var(--text-color); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2999; backdrop-filter: blur(4px); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text-color); font-size: 16px; }
        .btn-primary { background: #2ecc71; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-outline { background: none; border: 1px solid #2ecc71; color: #2ecc71; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #2ecc71; color: white; border-radius: 50%; font-size: 30px; border: none; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .user-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        audio { width: 100%; margin-top: 15px; border-radius: 30px; background: #f1f3f4; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body data-theme="light">

    <div class="sidebar">
        <h2>🎓 အိမ့်ချယ်ရီ 2026</h2>
        <div id="theme-btn" style="cursor:pointer; text-align:center; padding:8px; background:rgba(255,255,255,0.05); border-radius:5px; margin-bottom:15px;">🌓 Theme Change</div>
        <div class="user-box">
            <span id="display-name">ဧည့်သည် (Guest)</span><br>
            <small id="user-role">အများသုံးစနစ်</small>
        </div>
        <div id="m-all" class="menu-item menu-active" onclick="loadContent('all')">🏠 အားလုံး</div>
        <div id="m-audio" class="menu-item" onclick="loadContent('audio')">🎵 သီချင်းများ</div>
        <div id="m-dhamma" class="menu-item" onclick="loadContent('dhamma')">📘 တရားများ</div>
        <div id="m-knowledge" class="menu-item" onclick="loadContent('knowledge')">📚 စာပေဗဟုသုတ</div>
        <div style="margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:15px;">
            <div id="guest-tools">
                <button class="btn-outline" onclick="showModal('signup-modal')">📝 အကောင့်ဖွင့်ရန်</button>
                <div onclick="showModal('login-modal')" style="cursor:pointer; text-align:center; font-size: 13px; color: #bbb; margin-top:10px;">Login ဝင်ရန်</div>
            </div>
            <button id="logout-btn" onclick="location.reload()" style="display:none; width:100%; background:#e74c3c; color:white; border:none; padding:10px; border-radius:8px;">Logout</button>
        </div>
    </div>

    <div class="main">
        <h1 id="category-title" style="text-align:center;">🏠 အားလုံး</h1>
        <div id="content-display">အချက်အလက်များ ဆွဲယူနေပါသည်...</div>
    </div>

    <div id="overlay"></div>

    <div id="login-modal" class="modal">
        <h3>Login ဝင်ရန်</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn-primary" id="login-submit">ဝင်မည်</button>
    </div>

    <div id="signup-modal" class="modal">
        <h3>Sign Up (အကောင့်သစ်)</h3>
        <input type="text" id="regName" placeholder="နာမည်အပြည့်အစုံ">
        <input type="text" id="regUser" placeholder="Username ရွေးပါ">
        <input type="password" id="regPass" placeholder="Password ပေးပါ">
        <button class="btn-primary" id="signup-submit">အကောင့်ဖွင့်မည်</button>
    </div>

    <div id="upload-modal" class="modal">
        <h3 id="modal-title">ပို့စ်အသစ်တင်ရန်</h3>
        <input type="hidden" id="edit-id">
        <label>ကဏ္ဍရွေးပါ</label>
        <select id="postCat">
            <option value="audio">🎵 သီချင်း</option>
            <option value="dhamma">📘 တရား</option>
            <option value="knowledge">📚 စာပေဗဟုသုတ</option>
        </select>
        <input type="text" id="postTitle" placeholder="ခေါင်းစဉ်">
        <textarea id="postContent" rows="4" placeholder="အကြောင်းအရာ ရေးသားပါ"></textarea>
        <input type="text" id="postLink" placeholder="GitHub MP3 Link (သို့) YouTube Link">
        <button class="btn-primary" id="save-post-btn">သိမ်းဆည်းမည်</button>
    </div>

    <button id="add-btn" class="fab" style="display:none;">+</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, where, serverTimestamp, getDoc, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4c2aE6LOMjf00e_SPIB7snz8MbYy37_g",
            authDomain: "mymusicapp-380.firebaseapp.com",
            projectId: "mymusicapp-380",
            storageBucket: "mymusicapp-380.firebasestorage.app",
            messagingSenderId: "362148026754",
            appId: "1:362148026754:web:e5b21177553bcf4444979b",
            measurementId: "G-5G49NFKYVX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let isAdmin = false;

        // UI Management
        window.showModal = (id) => {
            document.getElementById(id).style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        };
        window.hideAllModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('overlay').style.display = 'none';
        };

        document.getElementById('theme-btn').onclick = () => {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        };

        // Authentication Logic
        document.getElementById('login-submit').onclick = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            if(!user || !pass) return alert("ဖြည့်စွက်ပါ");
            const s = await getDoc(doc(db, "portal_users", user));
            if(s.exists() && s.data().password === pass) {
                setUI(s.data(), user);
                hideAllModals();
            } else { alert("အကောင့်ဝင်ရန် မှားယွင်းနေပါသည်။"); }
        };

        document.getElementById('signup-submit').onclick = async () => {
            const name = document.getElementById('regName').value;
            const user = document.getElementById('regUser').value.toLowerCase().trim();
            const pass = document.getElementById('regPass').value;
            if(!name || !user || !pass) return alert("အကုန်ဖြည့်ပါ");
            await setDoc(doc(db, "portal_users", user), { fullName: name, password: pass, role: "user" });
            alert("အကောင့်ဖွင့်ပြီးပါပြီ။");
            setUI({fullName: name, role: "user"}, user);
            hideAllModals();
        };

        function setUI(data, username) {
            isAdmin = data.role === "admin";
            document.getElementById('display-name').innerText = data.fullName;
            document.getElementById('user-role').innerText = isAdmin ? "⭐ Admin" : "👤 Member";
            document.getElementById('guest-tools').style.display = "none";
            document.getElementById('logout-btn').style.display = "block";
            if(isAdmin) document.getElementById('add-btn').style.display = "block";
            loadContent('all');
        }

        // Content Display & Filtering
        window.loadContent = (filter = 'all') => {
            const titles = { all: "🏠 အားလုံး", audio: "🎵 သီချင်းများ", dhamma: "📘 တရားများ", knowledge: "📚 စာပေဗဟုသုတ" };
            document.getElementById('category-title').innerText = titles[filter];
            
            document.querySelectorAll('.menu-item').forEach(m => {
                m.classList.remove('menu-active');
                if (m.id === `m-${filter}`) m.classList.add('menu-active');
            });

            let q = query(collection(db, "portal_content"), orderBy("date", "desc"));
            if(filter !== 'all') {
                q = query(collection(db, "portal_content"), where("category", "==", filter), orderBy("date", "desc"));
            }

            onSnapshot(q, (snap) => {
                const display = document.getElementById('content-display');
                display.innerHTML = snap.empty ? "<p style='text-align:center;'>ပို့စ်များ မရှိသေးပါ။</p>" : "";
                
                snap.forEach(d => {
                    const data = d.data();
                    let link = (data.link || "").trim();
                    
                    // GitHub Link Auto-Correction
                    if (link.includes("github.com") && !link.includes("raw.githubusercontent.com")) {
                        link = link.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
                    }

                    const isAudio = link.toLowerCase().endsWith('.mp3') || link.toLowerCase().endsWith('.m4a') || link.toLowerCase().endsWith('.wav');
                    
                    display.innerHTML += `
                        <div class="post-card">
                            <div style="padding:20px;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <small style="color:var(--accent); font-weight:bold; background:rgba(52,152,219,0.1); padding:4px 10px; border-radius:15px;">#${data.category}</small>
                                    ${isAdmin ? `<div>
                                        <button onclick="editPost('${d.id}')" class="btn-edit">ပြင်ရန်</button>
                                        <button onclick="delPost('${d.id}')" class="btn-del">ဖျက်ရန်</button>
                                    </div>` : ''}
                                </div>
                                <h2 style="margin:15px 0 10px 0;">${data.title}</h2>
                                <p style="white-space:pre-wrap; line-height:1.7; color:var(--text-color);">${data.content}</p>
                                
                                ${link ? (isAudio ? 
                                    `<audio controls preload="metadata"><source src="${link}" type="audio/mpeg">Browser မပံ့ပိုးပါ</audio>` : 
                                    `<div style="margin-top:15px;"><a href="${link}" target="_blank" style="display:inline-block; color:#fff; background:var(--accent); padding:8px 15px; border-radius:5px; text-decoration:none;">🔗 ဤနေရာတွင် နှိပ်ကြည့်ပါ</a></div>`
                                ) : ''}
                            </div>
                        </div>`;
                });
            });
        };

        // Post Management
        window.editPost = async (id) => {
            const docSnap = await getDoc(doc(db, "portal_content", id));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('edit-id').value = id;
                document.getElementById('postTitle').value = data.title;
                document.getElementById('postContent').value = data.content;
                document.getElementById('postCat').value = data.category;
                document.getElementById('postLink').value = data.link || "";
                document.getElementById('modal-title').innerText = "ပို့စ်ပြင်ဆင်ရန်";
                showModal('upload-modal');
            }
        };

        window.delPost = async (id) => { if(confirm("ဤပို့စ်ကို အပြီးတိုင်ဖျက်မှာလား?")) await deleteDoc(doc(db, "portal_content", id)); };

        document.getElementById('save-post-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const category = document.getElementById('postCat').value;
            const link = document.getElementById('postLink').value;

            if(!title || !content) return alert("ခေါင်းစဉ်နှင့် အကြောင်းအရာ ဖြည့်ပါ");

            const postData = { title, content, category, link, date: serverTimestamp() };

            if(id) {
                await updateDoc(doc(db, "portal_content", id), { title, content, category, link });
            } else {
                await addDoc(collection(db, "portal_content"), postData);
            }

            hideAllModals();
            resetForm();
        };

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('postTitle').value = "";
            document.getElementById('postContent').value = "";
            document.getElementById('postLink').value = "";
            document.getElementById('modal-title').innerText = "ပို့စ်အသစ်တင်ရန်";
        }

        document.getElementById('add-btn').onclick = () => { resetForm(); showModal('upload-modal'); };
        document.getElementById('overlay').onclick = hideAllModals;
        
        loadContent('all');
    </script>
</body>
              </html>
